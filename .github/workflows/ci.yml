# Workflow名（GitHub Actionsの画面に表示される）
name: CI

# いつこのCIを動かすか（トリガー）
on:
  # PRが作成/更新されたときに実行
  pull_request:

permissions:
  contents: read

# 同じPRで新しい実行が始まったら古い実行をキャンセル
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # PR差分にRails関連の変更があるかを判定
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rails: ${{ steps.filter.outputs.rails }}
    steps:
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rails:
              - "app/**"
              - "bin/**"
              - "config/**"
              - "db/**"
              - "lib/**"
              - "test/**"
              - "Dockerfile.dev"
              - "docker-compose.dev.yml"
              - "docker-compose.test.yml"
              - "Gemfile"
              - "Gemfile.lock"
              - "Rakefile"
              - "Makefile"
              - ".github/workflows/ci.yml"

  # ----------------------------
  # Ruby静的チェック（Brakeman + Rubocop）
  # ----------------------------
  scan_ruby:
    # 実行環境（GitHubが用意するUbuntuマシン）
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードを runner にチェックアウトする（CI上にソースを配置）
      - name: Checkout code
        uses: actions/checkout@v6

      # Rubyをセットアップする（.ruby-version の指定に合わせる）
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          # bundler-cache: true により bundle install の結果をキャッシュして高速化
          bundler-cache: true

      # BrakemanでRailsアプリのよくある脆弱性を静的解析
      # --no-pager は出力をページャ（less/more等）に流さずCIログにそのまま出す
      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager
      # Rubocopでコード整形/静的解析を実行
      - name: Lint code for consistent style
        run: bin/rubocop -f github

  # ----------------------------
  # importmap の依存（JS）脆弱性監査
  # =>アプリが使っているJavaScriptの部品（ライブラリ）の中に、すでに知られている危険な欠陥がないかを自動でチェックする
  # ----------------------------
  scan_js:
    runs-on: ubuntu-latest

    steps:
      # OSパッケージをインストール（natto/MeCab用）
      - name: Install packages (for natto/MeCab)
        run: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              mecab libmecab-dev mecab-ipadic-utf8
      # ソース取得
      - name: Checkout code
        uses: actions/checkout@v6

      # Rubyセットアップ（importmapコマンド実行にRails環境が必要になることがあるため）
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      # importmap の依存関係を監査（脆弱性が見つかると失敗する）
      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  # ----------------------------
  # テスト（DBあり）
  # ----------------------------
  test:
    # Rails関連の変更があるPRのみ実行
    if: needs.changes.outputs.rails == 'true'
    needs: changes
    runs-on: ubuntu-latest

    steps:
      # ソース取得
      - name: Checkout code
        uses: actions/checkout@v6

      # Dockerfile.dev + docker-compose.test.yml を使って、ローカルと同じ経路で実行する
      - name: Run tests
        run: make test

      # system test 失敗時の画面を保全して調査しやすくする
      - name: Upload test screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-screenshots
          path: tmp/screenshots/failures_*.png
          retention-days: 1
          if-no-files-found: ignore
