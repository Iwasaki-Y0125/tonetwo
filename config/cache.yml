default: &default
  store_options:
    # Cap age of oldest cache entry to fulfill retention policies
    max_age: <%= 7.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= Rails.env %>

development:
  database: cache
  <<: *default

test:
  database: cache
  <<: *default
  store_options:
    max_age: <%= 7.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= "test-#{Process.pid}" %>

production:
  database: cache
  <<: *default
